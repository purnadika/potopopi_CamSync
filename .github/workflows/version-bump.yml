name: Automated Version Bump
on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Calculate and Bump Version
      shell: pwsh
      run: |
        $csprojPath = "PotopopiCamSync/PotopopiCamSync.csproj"
        $readmePath = "README.md"
        $headRef = "${{ github.event.pull_request.head.ref }}"
        
        # Load Version from csproj
        [xml]$csproj = Get-Content $csprojPath
        $currentVersion = $csproj.Project.PropertyGroup.Version
        Write-Host "Current Version: $currentVersion"
        
        $parts = $currentVersion.Split('.')
        $major = [int]$parts[0]
        $minor = [int]$parts[1]
        $patch = [int]$parts[2]
        
        # Determine bump type
        if ($headRef -like "bugfix/*") {
            $patch++
            Write-Host "Detected bugfix branch. Bumping Patch to $patch"
        } elseif ($headRef -eq "development") {
            $minor++
            $patch = 0
            Write-Host "Detected development branch. Bumping Minor to $minor"
        } else {
            Write-Host "No recognized branch pattern ($headRef). Skipping version bump."
            exit 0
        }
        
        $newVersion = "$major.$minor.$patch"
        Write-Host "New Version: $newVersion"
        
        # Update csproj
        $csproj.Project.PropertyGroup.Version = $newVersion
        $csproj.Save($csprojPath)
        
        # Update README
        $readme = Get-Content $readmePath -Raw
        $readme = $readme -replace "version-\d+\.\d+\.\d+-green", "version-$newVersion-green"
        $readme = $readme -replace "PotopopiCamSync_v\d+\.\d+\.\d+\.exe", "PotopopiCamSync_v$newVersion.exe"
        $readme | Set-Content $readmePath
        
        # Set environment variables for next steps
        "NEW_VERSION=$newVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Commit and Push Changes
      shell: pwsh
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        git add .
        git commit -m "chore: bump version to v${{ env.NEW_VERSION }} [skip ci]"
        git push origin main
        
    - name: Create Git Tag
      shell: pwsh
      run: |
        git tag "v${{ env.NEW_VERSION }}"
        git push origin "v${{ env.NEW_VERSION }}"
